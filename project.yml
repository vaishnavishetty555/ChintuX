name: Pawly
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  Pawly:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - "Info.plist"
          - "project.yml"
          - "Pawly.xcodeproj"
          - "PawlyTests"
    resources:
      - path: Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Pawly
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: BrandCream
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSUserNotificationsUsageDescription: "Pawly uses notifications to remind you about your pet's meals, medications, and checkups."
        NSCameraUsageDescription: "Pawly uses the camera to capture photos of your pet and their prescriptions or vaccine cards."
        NSPhotoLibraryUsageDescription: "Pawly accesses your photo library so you can set a photo for your pet and attach prescription images."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.pawly
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist

  PawlyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PawlyTests
    dependencies:
      - target: Pawly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.pawly.tests
        GENERATE_INFOPLIST_FILE: YES
